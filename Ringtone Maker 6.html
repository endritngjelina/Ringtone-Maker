<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RingTone Studio Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone.js/14.8.49/Tone.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #333;
            overflow-x: auto;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 60%, rgba(120,119,198,0.3) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            background: linear-gradient(45deg, #fff, #f8f9fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
            to { filter: drop-shadow(0 0 20px rgba(255,255,255,0.8)); }
        }

        .header p {
            font-size: 1.3rem;
            opacity: 0.95;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .main-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 
                0 25px 50px rgba(0,0,0,0.15),
                0 0 0 1px rgba(255,255,255,0.1),
                inset 0 1px 0 rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
        }

        .main-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
        }

        .controls-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            background: linear-gradient(145deg, #f8f9fa, #ffffff);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 
                0 8px 25px rgba(0,0,0,0.08),
                inset 0 1px 0 rgba(255,255,255,0.9);
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .control-group:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 12px 35px rgba(0,0,0,0.12),
                inset 0 1px 0 rgba(255,255,255,0.9);
        }

        .control-group::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #007bff, #28a745, #ffc107, #dc3545);
            border-radius: 16px 16px 0 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .control-group:hover::before {
            opacity: 0.6;
        }

        .control-group h3 {
            color: #495057;
            margin-bottom: 15px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        button {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 14px;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 123, 255, 0.4);
            background: linear-gradient(135deg, #0056b3, #004085);
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745, #1e7e34);
            color: white;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.4);
            background: linear-gradient(135deg, #1e7e34, #155724);
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }

        .btn-danger:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(220, 53, 69, 0.4);
            background: linear-gradient(135deg, #c82333, #bd2130);
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffc107, #e0a800);
            color: #212529;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.3);
        }

        .btn-warning:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 193, 7, 0.4);
            background: linear-gradient(135deg, #e0a800, #d39e00);
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #495057;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
            background: rgba(255,255,255,1);
            transform: translateY(-1px);
        }

        .input-group input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            height: 8px;
            background: linear-gradient(to right, #e9ecef, #e9ecef);
            border-radius: 5px;
            outline: none;
            padding: 0;
        }

        .input-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(0, 123, 255, 0.3);
            transition: all 0.3s ease;
        }

        .input-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.5);
        }

        .input-group input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 10px rgba(0, 123, 255, 0.3);
        }

        .piano-roll-container {
            background: linear-gradient(145deg, #ffffff, #f8f9fa);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 
                0 10px 30px rgba(0,0,0,0.1),
                inset 0 1px 0 rgba(255,255,255,0.9);
            border: 1px solid rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
        }

        .piano-roll-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #007bff, #28a745, #ffc107, #dc3545, #6f42c1);
            border-radius: 20px 20px 0 0;
        }

        .piano-roll-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .piano-roll {
            display: grid;
            grid-template-columns: 80px 1fr;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }

        .note-labels {
            background: #f8f9fa;
            border-right: 2px solid #dee2e6;
        }

        .note-label {
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #dee2e6;
            font-size: 12px;
            font-weight: 700;
            color: #495057;
            transition: all 0.2s ease;
            background: linear-gradient(to right, #f8f9fa, #ffffff);
        }

        .note-label.black {
            background: linear-gradient(to right, #343a40, #495057);
            color: white;
            font-weight: 600;
        }

        .note-label:hover {
            background: linear-gradient(to right, #e9ecef, #f8f9fa);
            transform: translateX(2px);
        }

        .note-label.black:hover {
            background: linear-gradient(to right, #495057, #6c757d);
        }

        .timeline-marker {
            text-align: center;
            font-weight: 700;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #007bff;
            font-size: 11px;
            background: rgba(0, 123, 255, 0.05);
            border-radius: 4px;
            margin: 0 1px;
        }

        /* Enhanced Loading States */
        .loading {
            position: relative;
            overflow: hidden;
        }

        .loading::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Interactive Feedback */
        .feedback-success {
            animation: successPulse 0.6s ease;
        }

        .feedback-error {
            animation: errorShake 0.6s ease;
        }

        @keyframes successPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); background-color: rgba(40, 167, 69, 0.1); }
            100% { transform: scale(1); }
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Improved Scrollbars */
        .grid-container::-webkit-scrollbar {
            height: 8px;
        }

        .grid-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        .grid-container::-webkit-scrollbar-thumb {
            background: linear-gradient(90deg, #007bff, #0056b3);
            border-radius: 4px;
            transition: background 0.3s ease;
        }

        .grid-container::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(90deg, #0056b3, #004085);
        }

        /* Tooltip Styles */
        .tooltip {
            position: relative;
        }

        .tooltip::before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .tooltip::after {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: rgba(0,0,0,0.9);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .tooltip:hover::before,
        .tooltip:hover::after {
            opacity: 1;
        }

        /* Focus Indicators */
        button:focus-visible,
        input:focus-visible,
        select:focus-visible {
            outline: 2px solid #007bff;
            outline-offset: 2px;
        }

        /* Enhanced Mobile Experience */
        @media (max-width: 768px) {
            .main-panel {
                padding: 20px;
                border-radius: 16px;
            }
            
            .control-group {
                padding: 20px;
            }
            
            .piano-roll-container {
                padding: 20px;
            }
            
            .export-section {
                padding: 25px;
            }
            
            button {
                padding: 12px 20px;
                font-size: 13px;
            }
            
            .header h1 {
                font-size: 2.5rem;
            }
            
            .grid-cell {
                width: 30px;
                height: 35px;
            }
            
            .note-grid {
                grid-template-columns: repeat(16, 30px);
            }
            
            .timeline-ruler {
                grid-template-columns: repeat(16, 30px);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 5px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            button {
                width: 100%;
                margin-bottom: 8px;
            }
            
            .preset-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .preset-btn {
                width: 80%;
                margin-bottom: 8px;
            }
        }

        .grid-container {
            overflow-x: auto;
            min-width: 800px;
        }

        .note-grid {
            display: grid;
            grid-template-rows: repeat(24, 30px);
            gap: 0;
        }

        .note-row {
            display: grid;
            grid-template-columns: repeat(32, 25px);
            gap: 1px;
            border-bottom: 1px solid #dee2e6;
        }

        .note-row.black {
            background: #f8f9fa;
        }

        .grid-cell {
            width: 25px;
            height: 30px;
            border-right: 1px solid #e9ecef;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border-radius: 2px;
        }

        .grid-cell:hover {
            background: rgba(0, 123, 255, 0.15);
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(0, 123, 255, 0.2);
        }

        .grid-cell.active {
            background: linear-gradient(135deg, #007bff, #0056b3);
            box-shadow: 
                inset 0 0 10px rgba(0,0,0,0.2),
                0 2px 10px rgba(0, 123, 255, 0.4);
            border-radius: 4px;
            transform: scale(1.1);
            animation: pulse 0.3s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1.1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1.1); }
        }

        .grid-cell.active::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .grid-cell.beat {
            border-right: 2px solid #007bff;
            background: rgba(0, 123, 255, 0.03);
        }

        .timeline {
            display: grid;
            grid-template-columns: 80px 1fr;
            margin-bottom: 10px;
        }

        .timeline-spacer {
            width: 80px;
        }

        .timeline-ruler {
            display: grid;
            grid-template-columns: repeat(32, 25px);
            gap: 1px;
            font-size: 10px;
            color: #6c757d;
        }

        .timeline-marker {
            text-align: center;
            font-weight: 600;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .waveform-container {
            background: linear-gradient(145deg, #f8f9fa, #ffffff);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 
                0 8px 25px rgba(0,0,0,0.08),
                inset 0 1px 0 rgba(255,255,255,0.9);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .waveform {
            width: 100%;
            height: 120px;
            background: linear-gradient(145deg, #ffffff, #f8f9fa);
            border: 2px solid #e9ecef;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        .progress-indicator {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 3px;
            background: linear-gradient(to bottom, #dc3545, #ff6b6b);
            transition: left 0.1s linear;
            z-index: 10;
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(220, 53, 69, 0.5);
        }

        .export-section {
            background: linear-gradient(135deg, #28a745, #20c997, #17a2b8);
            color: white;
            padding: 35px;
            border-radius: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(40, 167, 69, 0.3);
        }

        .export-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(255,255,255,0.05) 10px,
                rgba(255,255,255,0.05) 20px
            );
            animation: shimmer 20s linear infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-50%) translateY(-50%) rotate(0deg); }
            100% { transform: translateX(-50%) translateY(-50%) rotate(360deg); }
        }

        .export-section h3 {
            margin-bottom: 20px;
            font-size: 1.5rem;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }

        .preset-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        .preset-btn {
            padding: 10px 18px;
            background: rgba(255,255,255,0.15);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            backdrop-filter: blur(10px);
        }

        .preset-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border-color: rgba(255,255,255,0.5);
        }

        .preset-btn:active {
            transform: scale(0.98);
        }

        .status-bar {
            background: linear-gradient(135deg, #343a40, #495057);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            box-shadow: 0 8px 25px rgba(52, 58, 64, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .visualization {
            display: flex;
            gap: 3px;
            align-items: end;
            height: 50px;
            padding: 8px 0;
            justify-content: center;
        }

        .bar {
            width: 4px;
            background: linear-gradient(to top, #007bff, #0056b3, #28a745);
            border-radius: 2px;
            transition: height 0.15s ease;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.3);
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .controls-section {
                grid-template-columns: 1fr;
            }
            
            .grid-container {
                min-width: 600px;
            }
            
            .note-grid {
                grid-template-columns: repeat(16, 25px);
            }
            
            .timeline-ruler {
                grid-template-columns: repeat(16, 25px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 RingTone Studio Pro</h1>
            <p>Professional Ringtone & Melody Creation Suite</p>
        </div>

        <div class="main-panel">
            <div class="controls-section">
                <div class="control-group">
                    <h3>⏯️ Playback Controls</h3>
                    <div class="button-group">
                        <button class="btn-success" id="playBtn">▶️ Play</button>
                        <button class="btn-warning" id="pauseBtn">⏸️ Pause</button>
                        <button class="btn-danger" id="stopBtn">⏹️ Stop</button>
                    </div>
                    <div class="input-group">
                        <label>Tempo (BPM)</label>
                        <input type="range" id="tempoSlider" min="60" max="200" value="120">
                        <span id="tempoValue">120 BPM</span>
                    </div>
                </div>

                <div class="control-group">
                    <h3>🎹 Instrument Settings</h3>
                    <div class="input-group">
                        <label>Waveform Type</label>
                        <select id="waveformSelect">
                            <option value="sine">Sine Wave</option>
                            <option value="square">Square Wave</option>
                            <option value="sawtooth">Sawtooth</option>
                            <option value="triangle">Triangle</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Volume</label>
                        <input type="range" id="volumeSlider" min="0" max="100" value="70">
                        <span id="volumeValue">70%</span>
                    </div>
                </div>

                <div class="control-group">
                    <h3>🎚️ Effects</h3>
                    <div class="input-group">
                        <label>Reverb</label>
                        <input type="range" id="reverbSlider" min="0" max="100" value="20">
                        <span id="reverbValue">20%</span>
                    </div>
                    <div class="input-group">
                        <label>Delay</label>
                        <input type="range" id="delaySlider" min="0" max="100" value="0">
                        <span id="delayValue">0%</span>
                    </div>
                </div>

                <div class="control-group">
                    <h3>🎼 Quick Actions</h3>
                    <div class="button-group">
                        <button class="btn-primary" id="clearBtn">🗑️ Clear All</button>
                        <button class="btn-primary" id="randomBtn">🎲 Random</button>
                        <button class="btn-primary" id="scaleBtn">🎵 Scale Fill</button>
                    </div>
                </div>
            </div>

            <div class="piano-roll-container">
                <div class="piano-roll-header">
                    <h3>🎹 Piano Roll Editor</h3>
                    <div class="preset-buttons">
                        <button class="preset-btn" data-preset="alarm">⏰ Alarm</button>
                        <button class="preset-btn" data-preset="notification">📱 Notification</button>
                        <button class="preset-btn" data-preset="ringtone">📞 Ringtone</button>
                        <button class="preset-btn" data-preset="melody">🎵 Melody</button>
                    </div>
                </div>

                <div class="timeline">
                    <div class="timeline-spacer"></div>
                    <div class="timeline-ruler" id="timelineRuler"></div>
                </div>

                <div class="piano-roll">
                    <div class="note-labels" id="noteLabels"></div>
                    <div class="grid-container">
                        <div class="note-grid" id="noteGrid"></div>
                    </div>
                </div>
            </div>

            <div class="waveform-container">
                <h3>📊 Audio Visualization</h3>
                <div class="waveform">
                    <div class="progress-indicator" id="progressIndicator"></div>
                    <div class="visualization" id="visualization"></div>
                </div>
            </div>

            <div class="export-section">
                <h3>💾 Export Your Ringtone</h3>
                <div class="input-group" style="max-width: 300px; margin: 0 auto;">
                    <label style="color: white;">Filename</label>
                    <input type="text" id="filenameInput" value="my-ringtone" style="color: #333;">
                </div>
                <div class="button-group" style="justify-content: center; margin-top: 15px;">
                    <button class="btn-success" id="exportBtn">🎵 Export as MP3</button>
                    <button class="btn-primary" id="saveProjectBtn">💾 Save Project</button>
                    <button class="btn-warning" id="loadProjectBtn">📁 Load Project</button>
                </div>
            </div>

            <div class="status-bar">
                <div>
                    <span id="statusText">Ready to create amazing ringtones!</span>
                </div>
                <div>
                    <span>Duration: <span id="durationText">0.0s</span></span>
                    <span style="margin-left: 20px;">Notes: <span id="noteCount">0</span></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        class RingtoneMaker {
            constructor() {
                this.notes = Array(24).fill(null).map(() => Array(32).fill(false));
                this.noteNames = [
                    'C6', 'B5', 'A#5', 'A5', 'G#5', 'G5', 'F#5', 'F5', 'E5', 'D#5', 'D5', 'C#5',
                    'C5', 'B4', 'A#4', 'A4', 'G#4', 'G4', 'F#4', 'F4', 'E4', 'D#4', 'D4', 'C#4'
                ];
                this.frequencies = [
                    1046.50, 987.77, 932.33, 880.00, 830.61, 783.99, 739.99, 698.46, 659.25, 622.25, 587.33, 554.37,
                    523.25, 493.88, 466.16, 440.00, 415.30, 392.00, 369.99, 349.23, 329.63, 311.13, 293.66, 277.18
                ];
                this.isPlaying = false;
                this.currentStep = 0;
                this.tempo = 120;
                this.synth = null;
                this.reverb = null;
                this.delay = null;
                this.sequence = null;
                this.recorder = null;
                this.recordedBuffer = null;
                this.analyser = null;
                this.visualizationBars = [];
                
                this.init();
            }

            async init() {
                await Tone.start();
                this.setupAudio();
                this.setupUI();
                this.setupEventListeners();
                this.createVisualization();
            }

            setupAudio() {
                // Create audio chain
                this.reverb = new Tone.Reverb(1).toDestination();
                this.delay = new Tone.FeedbackDelay("8n", 0.2).connect(this.reverb);
                this.synth = new Tone.PolySynth().connect(this.delay);
                
                // Set initial volume
                this.synth.volume.value = -10;
                
                // Create analyser for visualization
                this.analyser = new Tone.Analyser("waveform", 32);
                this.synth.connect(this.analyser);
                
                // Create recorder
                this.recorder = new Tone.Recorder();
                this.synth.connect(this.recorder);
            }

            setupUI() {
                this.createPianoRoll();
                this.createTimeline();
                this.updateControls();
            }

            createPianoRoll() {
                const noteLabels = document.getElementById('noteLabels');
                const noteGrid = document.getElementById('noteGrid');
                
                noteLabels.innerHTML = '';
                noteGrid.innerHTML = '';

                for (let note = 0; note < 24; note++) {
                    // Create note label
                    const label = document.createElement('div');
                    label.className = `note-label ${this.noteNames[note].includes('#') ? 'black' : ''}`;
                    label.textContent = this.noteNames[note];
                    noteLabels.appendChild(label);

                    // Create note row
                    const row = document.createElement('div');
                    row.className = `note-row ${this.noteNames[note].includes('#') ? 'black' : ''}`;
                    
                    for (let step = 0; step < 32; step++) {
                        const cell = document.createElement('div');
                        cell.className = `grid-cell ${step % 4 === 0 ? 'beat' : ''}`;
                        cell.dataset.note = note;
                        cell.dataset.step = step;
                        
                        cell.addEventListener('click', () => this.toggleNote(note, step));
                        row.appendChild(cell);
                    }
                    
                    noteGrid.appendChild(row);
                }
            }

            createTimeline() {
                const ruler = document.getElementById('timelineRuler');
                ruler.innerHTML = '';
                
                for (let i = 0; i < 32; i++) {
                    const marker = document.createElement('div');
                    marker.className = 'timeline-marker';
                    marker.textContent = i % 4 === 0 ? Math.floor(i / 4) + 1 : '';
                    ruler.appendChild(marker);
                }
            }

            createVisualization() {
                const viz = document.getElementById('visualization');
                viz.innerHTML = '';
                
                for (let i = 0; i < 32; i++) {
                    const bar = document.createElement('div');
                    bar.className = 'bar';
                    bar.style.height = '2px';
                    viz.appendChild(bar);
                    this.visualizationBars.push(bar);
                }
                
                this.updateVisualization();
            }

            updateVisualization() {
                if (this.analyser && this.isPlaying) {
                    const values = this.analyser.getValue();
                    this.visualizationBars.forEach((bar, i) => {
                        const value = values[i] || 0;
                        const height = Math.max(2, Math.abs(value) * 40);
                        bar.style.height = `${height}px`;
                    });
                }
                requestAnimationFrame(() => this.updateVisualization());
            }

            toggleNote(note, step) {
                this.notes[note][step] = !this.notes[note][step];
                this.updateCell(note, step);
                this.updateStatus();
                
                // Play note immediately for feedback
                if (this.notes[note][step]) {
                    const freq = this.frequencies[note];
                    this.synth.triggerAttackRelease(freq, "8n");
                }
            }

            updateCell(note, step) {
                const cell = document.querySelector(`[data-note="${note}"][data-step="${step}"]`);
                if (cell) {
                    cell.classList.toggle('active', this.notes[note][step]);
                }
            }

            setupEventListeners() {
                // Playback controls with tooltips
                const playBtn = document.getElementById('playBtn');
                const pauseBtn = document.getElementById('pauseBtn');
                const stopBtn = document.getElementById('stopBtn');
                
                playBtn.className += ' tooltip';
                playBtn.setAttribute('data-tooltip', 'Play your melody');
                pauseBtn.className += ' tooltip';
                pauseBtn.setAttribute('data-tooltip', 'Pause playback');
                stopBtn.className += ' tooltip';
                stopBtn.setAttribute('data-tooltip', 'Stop and reset');
                
                playBtn.addEventListener('click', () => this.play());
                pauseBtn.addEventListener('click', () => this.pause());
                stopBtn.addEventListener('click', () => this.stop());

                // Parameter controls
                document.getElementById('tempoSlider').addEventListener('input', (e) => {
                    this.tempo = parseInt(e.target.value);
                    document.getElementById('tempoValue').textContent = `${this.tempo} BPM`;
                    if (this.sequence) {
                        Tone.Transport.bpm.value = this.tempo;
                    }
                });

                document.getElementById('volumeSlider').addEventListener('input', (e) => {
                    const volume = parseInt(e.target.value);
                    this.synth.volume.value = Tone.gainToDb(volume / 100);
                    document.getElementById('volumeValue').textContent = `${volume}%`;
                });

                document.getElementById('waveformSelect').addEventListener('change', (e) => {
                    this.synth.set({ oscillator: { type: e.target.value } });
                });

                document.getElementById('reverbSlider').addEventListener('input', (e) => {
                    const reverb = parseInt(e.target.value) / 100;
                    this.reverb.wet.value = reverb;
                    document.getElementById('reverbValue').textContent = `${e.target.value}%`;
                });

                document.getElementById('delaySlider').addEventListener('input', (e) => {
                    const delay = parseInt(e.target.value) / 100;
                    this.delay.wet.value = delay;
                    document.getElementById('delayValue').textContent = `${e.target.value}%`;
                });

                // Action buttons
                document.getElementById('clearBtn').addEventListener('click', () => this.clearAll());
                document.getElementById('randomBtn').addEventListener('click', () => this.generateRandom());
                document.getElementById('scaleBtn').addEventListener('click', () => this.fillScale());

                // Preset buttons
                document.querySelectorAll('.preset-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.loadPreset(e.target.dataset.preset);
                    });
                });

                // Export buttons with enhanced feedback
                const exportBtn = document.getElementById('exportBtn');
                const saveBtn = document.getElementById('saveProjectBtn');
                const loadBtn = document.getElementById('loadProjectBtn');
                
                exportBtn.className += ' tooltip';
                exportBtn.setAttribute('data-tooltip', 'Export as high-quality WAV');
                saveBtn.className += ' tooltip';
                saveBtn.setAttribute('data-tooltip', 'Save project file');
                loadBtn.className += ' tooltip';
                loadBtn.setAttribute('data-tooltip', 'Load project file');
                
                exportBtn.addEventListener('click', () => {
                    exportBtn.classList.add('loading');
                    setTimeout(() => exportBtn.classList.remove('loading'), 2000);
                    this.exportAudio();
                });
                saveBtn.addEventListener('click', () => this.saveProject());
                loadBtn.addEventListener('click', () => this.loadProject());
            }

            play() {
                if (this.isPlaying) return;
                
                this.isPlaying = true;
                this.currentStep = 0;
                
                Tone.Transport.bpm.value = this.tempo;
                
                // Start recording
                this.recorder.start();
                
                this.sequence = new Tone.Sequence((time, step) => {
                    this.currentStep = step;
                    this.updateProgressIndicator();
                    
                    // Play notes for current step
                    const notesToPlay = [];
                    for (let note = 0; note < 24; note++) {
                        if (this.notes[note][step]) {
                            notesToPlay.push(this.frequencies[note]);
                        }
                    }
                    
                    if (notesToPlay.length > 0) {
                        this.synth.triggerAttackRelease(notesToPlay, "8n", time);
                    }
                    
                }, Array.from({length: 32}, (_, i) => i), "8n");
                
                this.sequence.start();
                Tone.Transport.start();
                
                this.updateStatus('Playing...');
            }

            pause() {
                if (!this.isPlaying) return;
                
                Tone.Transport.pause();
                this.isPlaying = false;
                this.updateStatus('Paused');
            }

            stop() {
                Tone.Transport.stop();
                if (this.sequence) {
                    this.sequence.dispose();
                    this.sequence = null;
                }
                
                // Stop recording
                if (this.recorder.state === "started") {
                    this.recorder.stop().then((recording) => {
                        this.recordedBuffer = recording;
                    });
                }
                
                this.isPlaying = false;
                this.currentStep = 0;
                this.updateProgressIndicator();
                this.updateStatus('Stopped');
            }

            updateProgressIndicator() {
                const indicator = document.getElementById('progressIndicator');
                const progress = (this.currentStep / 32) * 100;
                indicator.style.left = `${progress}%`;
            }

            clearAll() {
                this.notes = Array(24).fill(null).map(() => Array(32).fill(false));
                document.querySelectorAll('.grid-cell').forEach(cell => {
                    cell.classList.remove('active');
                });
                this.updateStatus();
            }

            generateRandom() {
                this.clearAll();
                const noteCount = Math.floor(Math.random() * 20) + 10;
                
                for (let i = 0; i < noteCount; i++) {
                    const note = Math.floor(Math.random() * 24);
                    const step = Math.floor(Math.random() * 32);
                    this.notes[note][step] = true;
                    this.updateCell(note, step);
                }
                
                this.updateStatus();
            }

            fillScale() {
                this.clearAll();
                const scale = [0, 2, 4, 5, 7, 9, 11]; // C major scale
                
                for (let i = 0; i < 32; i += 2) {
                    if (Math.random() > 0.3) {
                        const scaleNote = scale[Math.floor(Math.random() * scale.length)];
                        const octave = Math.floor(Math.random() * 2);
                        const note = 12 + scaleNote + (octave * 12);
                        
                        if (note < 24) {
                            this.notes[note][i] = true;
                            this.updateCell(note, i);
                        }
                    }
                }
                
                this.updateStatus();
            }

            loadPreset(type) {
                this.clearAll();
                
                const presets = {
                    alarm: [
                        [6, [0, 4, 8, 12, 16, 20, 24, 28]],
                        [8, [2, 6, 10, 14, 18, 22, 26, 30]]
                    ],
                    notification: [
                        [4, [0, 8, 16]],
                        [6, [4, 12, 20]]
                    ],
                    ringtone: [
                        [5, [0, 2, 4, 6]],
                        [7, [8, 10, 12, 14]],
                        [9, [16, 18, 20, 22]],
                        [5, [24, 26, 28, 30]]
                    ],
                    melody: [
                        [8, [0, 4, 8, 12]],
                        [6, [2, 6, 10, 14]],
                        [4, [16, 20, 24, 28]],
                        [2, [18, 22, 26, 30]]
                    ]
                };
                
                if (presets[type]) {
                    presets[type].forEach(([note, steps]) => {
                        steps.forEach(step => {
                            this.notes[note][step] = true;
                            this.updateCell(note, step);
                        });
                    });
                }
                
                this.updateStatus();
            }

            async exportAudio() {
                const filename = document.getElementById('filenameInput').value || 'my-ringtone';
                
                if (!this.hasNotes()) {
                    this.updateStatus('❌ No notes to export! Add some notes first.');
                    return;
                }

                this.updateStatus('🎵 Generating audio...');
                
                try {
                    // Create a new offline context for clean recording
                    const duration = (32 / 4) * (60 / this.tempo);
                    const offline = new Tone.Offline(() => {
                        const synth = new Tone.PolySynth().toDestination();
                        synth.set({ oscillator: { type: document.getElementById('waveformSelect').value } });
                        
                        const stepDuration = 60 / this.tempo / 4; // Duration of each step
                        
                        for (let step = 0; step < 32; step++) {
                            const time = step * stepDuration;
                            const notesToPlay = [];
                            
                            for (let note = 0; note < 24; note++) {
                                if (this.notes[note][step]) {
                                    notesToPlay.push(this.frequencies[note]);
                                }
                            }
                            
                            if (notesToPlay.length > 0) {
                                synth.triggerAttackRelease(notesToPlay, "8n", time);
                            }
                        }
                    }, duration);

                    const buffer = await offline;
                    const wav = this.bufferToWav(buffer);
                    this.downloadBlob(wav, `${filename}.wav`);
                    
                    this.updateStatus('✅ Audio exported successfully!');
                    
                } catch (error) {
                    console.error('Export error:', error);
                    this.updateStatus('❌ Export failed. Please try again.');
                }
            }

            bufferToWav(buffer) {
                const length = buffer.length * buffer.numberOfChannels * 2;
                const arrayBuffer = new ArrayBuffer(44 + length);
                const view = new DataView(arrayBuffer);
                
                // WAV header
                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) {
                        view.setUint8(offset + i, string.charCodeAt(i));
                    }
                };
                
                writeString(0, 'RIFF');
                view.setUint32(4, 36 + length, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, buffer.numberOfChannels, true);
                view.setUint32(24, buffer.sampleRate, true);
                view.setUint32(28, buffer.sampleRate * buffer.numberOfChannels * 2, true);
                view.setUint16(32, buffer.numberOfChannels * 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, length, true);
                
                let offset = 44;
                for (let i = 0; i < buffer.length; i++) {
                    for (let channel = 0; channel < buffer.numberOfChannels; channel++) {
                        const sample = Math.max(-1, Math.min(1, buffer.getChannelData(channel)[i]));
                        view.setInt16(offset, sample * 0x7FFF, true);
                        offset += 2;
                    }
                }
                
                return new Blob([arrayBuffer], { type: 'audio/wav' });
            }

            downloadBlob(blob, filename) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            saveProject() {
                const project = {
                    notes: this.notes,
                    tempo: this.tempo,
                    waveform: document.getElementById('waveformSelect').value,
                    volume: document.getElementById('volumeSlider').value,
                    reverb: document.getElementById('reverbSlider').value,
                    delay: document.getElementById('delaySlider').value,
                    timestamp: new Date().toISOString()
                };
                
                const blob = new Blob([JSON.stringify(project, null, 2)], { type: 'application/json' });
                const filename = document.getElementById('filenameInput').value || 'ringtone-project';
                this.downloadBlob(blob, `${filename}.json`);
                
                this.updateStatus('💾 Project saved successfully!');
            }

            loadProject() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const project = JSON.parse(e.target.result);
                            
                            // Load notes
                            this.notes = project.notes || this.notes;
                            
                            // Update UI
                            this.clearAll();
                            for (let note = 0; note < 24; note++) {
                                for (let step = 0; step < 32; step++) {
                                    if (this.notes[note][step]) {
                                        this.updateCell(note, step);
                                    }
                                }
                            }
                            
                            // Load settings
                            if (project.tempo) {
                                this.tempo = project.tempo;
                                document.getElementById('tempoSlider').value = project.tempo;
                                document.getElementById('tempoValue').textContent = `${project.tempo} BPM`;
                            }
                            
                            if (project.waveform) {
                                document.getElementById('waveformSelect').value = project.waveform;
                                this.synth.set({ oscillator: { type: project.waveform } });
                            }
                            
                            if (project.volume) {
                                document.getElementById('volumeSlider').value = project.volume;
                                document.getElementById('volumeValue').textContent = `${project.volume}%`;
                                this.synth.volume.value = Tone.gainToDb(project.volume / 100);
                            }
                            
                            if (project.reverb) {
                                document.getElementById('reverbSlider').value = project.reverb;
                                document.getElementById('reverbValue').textContent = `${project.reverb}%`;
                                this.reverb.wet.value = project.reverb / 100;
                            }
                            
                            if (project.delay) {
                                document.getElementById('delaySlider').value = project.delay;
                                document.getElementById('delayValue').textContent = `${project.delay}%`;
                                this.delay.wet.value = project.delay / 100;
                            }
                            
                            this.updateStatus('📁 Project loaded successfully!');
                            
                        } catch (error) {
                            console.error('Load error:', error);
                            this.updateStatus('❌ Failed to load project file.');
                        }
                    };
                    
                    reader.readAsText(file);
                };
                
                input.click();
            }

            hasNotes() {
                return this.notes.some(row => row.some(cell => cell));
            }

            getNoteCount() {
                return this.notes.flat().filter(Boolean).length;
            }

            getDuration() {
                const beatsPerSecond = this.tempo / 60;
                const totalBeats = 32 / 4; // 32 steps = 8 beats
                return (totalBeats / beatsPerSecond).toFixed(1);
            }

            updateStatus(message = null) {
                const statusText = document.getElementById('statusText');
                const noteCount = document.getElementById('noteCount');
                const durationText = document.getElementById('durationText');
                
                if (message) {
                    statusText.textContent = message;
                    
                    // Add visual feedback based on message type
                    const statusBar = document.querySelector('.status-bar');
                    if (message.includes('✅') || message.includes('successfully')) {
                        statusBar.classList.add('feedback-success');
                        setTimeout(() => statusBar.classList.remove('feedback-success'), 600);
                    } else if (message.includes('❌') || message.includes('failed') || message.includes('error')) {
                        statusBar.classList.add('feedback-error');
                        setTimeout(() => statusBar.classList.remove('feedback-error'), 600);
                    }
                } else {
                    statusText.textContent = this.hasNotes() ? 
                        'Ready to play! Use controls above.' : 
                        'Add some notes to get started!';
                }
                
                noteCount.textContent = this.getNoteCount();
                durationText.textContent = `${this.getDuration()}s`;
            }

            updateControls() {
                // Initialize all control displays
                document.getElementById('tempoValue').textContent = `${this.tempo} BPM`;
                document.getElementById('volumeValue').textContent = '70%';
                document.getElementById('reverbValue').textContent = '20%';
                document.getElementById('delayValue').textContent = '0%';
            }
        }

        // Initialize the application
        document.addEventListener('DOMContentLoaded', () => {
            new RingtoneMaker();
        });
    </script>
